server.port=8080
#server.ssl.key-store=classpath:keystore
#server.ssl.key-store-password=serverroot
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=server

spring.datasource.schema=classpath:schema.sql
#spring.datasource.data=classpath:init-data.sql

mybatis.mapper-locations=classpath:mapper/*.xml

spring.datasource.url=jdbc:h2:file:./Server
spring.datasource.username=server
spring.datasource.password=server
spring.jpa.database=h2
spring.jpa.show-sql=true
spring.h2.console.enabled=false

# activemq client config
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.packages.trust-all=true
spring.activemq.pool.enabled=true
spring.activemq.pool.block-if-full=true
spring.activemq.pool.block-if-full-timeout=-1
spring.activemq.pool.idle-timeout=30000
spring.activemq.pool.max-connections=1
spring.activemq.pool.max-sessions-per-connection=100
spring.activemq.pool.time-between-expiration-check=-1
spring.activemq.pool.use-anonymous-producers=true

spring.jms.listener.acknowledge-mode=auto
spring.jms.listener.auto-startup=true
spring.jms.listener.concurrency=5
spring.jms.listener.max-concurrency=10
spring.jms.pub-sub-domain=true
spring.jms.template.default-destination=empty
spring.jms.template.delivery-mode=persistent
spring.jms.template.priority=100
spring.jms.template.qos-enabled=true
spring.jms.template.receive-timeout=1000
spring.jms.template.time-to-live=36000

# activemq broker
user.mq.activemq.broker.connector=tcp://localhost:61616
user.mq.activemq.broker.id=embed-server-broker
# activemq client
user.mq.activemq.client.url=tcp://localhost:61616
user.mq.activemq.client.topic.mgmt=mgmt